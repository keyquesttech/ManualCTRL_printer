#####################################
###       Part cooling fan        ###
#####################################

[fan]
pin: PB15
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.010
hardware_pwm: False
kick_start_time: 0.500
off_below: 0.0

#####################################
###       Hotend cooling fan      ###
#####################################

[heater_fan heatbreak_cooling_fan]
pin: PC6
max_power: 1
off_below: 1
heater: extruder
heater_temp: 45
fan_speed: 1.0