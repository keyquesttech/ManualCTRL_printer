# ─────────────────────────────────────────────────────────────
# ManualCTRL Printer Configuration
# Host-side settings only.  Hardware config lives in firmware.
# ─────────────────────────────────────────────────────────────

# ── Serial Connection ───────────────────────────────────────
serial:
  port: /dev/ttyACM0
  baud_rate: 115200

# ── Firmware (host sends this protocol) ─────────────────────
firmware:
  type: marlin       # "marlin" = G-code (Marlin); "custom" = ManualCTRL MOV/STOP/TEMP
  marlin_bed_axis: B # Axis letter for bed rotation in Marlin (B or A)

# ── Machine Limits (used to clamp UI-sent velocities) ──────
machine:
  max_velocity: 200            # deg/s — bed rotation
  max_accel: 1000              # deg/s²
  max_z_velocity: 10           # mm/s
  max_z_accel: 50              # mm/s²
  z_max: 155                   # mm — max Z travel

# ── Bed Rotation (informational + UI display) ──────────────
bed:
  gear_ratio: "80:20"          # 4:1 reduction
  rotation_distance: 90        # degrees per motor revolution

# ── Extruder (flow & cross-section calculations) ───────────
extruder:
  nozzle_diameter: 1.8         # mm
  filament_diameter: 1.8       # mm
  rotation_distance: 4.637     # mm filament per motor revolution (Orbiter 2.0)
  max_extrude_cross_section: 15.0  # mm²
  max_extrude_only_velocity: 120   # mm/s
  max_extrude_only_distance: 100   # mm
  max_temp: 250                # °C — UI input limit

# ── Manual Control Defaults ────────────────────────────────
motion:
  y_feedrate: 2700             # deg/min — bed rotation speed
  y_step: 1.0                  # degrees per tick (unused in velocity mode)
  e_feedrate: 300              # mm/min — extrusion speed
  e_step: 0.5                  # mm per tick (unused in velocity mode)
  z_feedrate: 600              # mm/min — Z axis speed
  z_step: 0.1                  # mm per tick (unused in velocity mode)
  tick_hz: 15                  # state-change polling rate

# ── G-code Macros ──────────────────────────────────────────
macros:
  startup_gcode: |
    STATUS
  shutdown_gcode: |
    TEMP 0
    FAN 0
    STOP
