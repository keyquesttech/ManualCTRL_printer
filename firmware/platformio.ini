[platformio]
default_envs = default

[env]
platform = ststm32
board = skr_mini_e3_v3
framework = arduino
board_build.offset = 0x2000
build_flags =
    -DVECT_TAB_OFFSET=0x2000
    -Wl,--defsym=LD_FLASH_OFFSET=0x2000
    -DUSBCON
    -DUSBD_USE_CDC
    -DHAL_PCD_MODULE_ENABLED
    -DSERIAL_RX_BUFFER_SIZE=256
    -DSERIAL_TX_BUFFER_SIZE=256
    -Os
lib_deps =
    teemuatlut/TMCStepper@^0.7.3
    waspinator/AccelStepper@^1.64

; Default env — PlatformIO downloads its own ARM toolchain (x86_64 / aarch64)
[env:default]

; For 32-bit Raspberry Pi — uses system-installed gcc-arm-none-eabi from apt
[env:pi]
platform_packages =
    toolchain-gccarmnoneeabi@symlink:///usr
